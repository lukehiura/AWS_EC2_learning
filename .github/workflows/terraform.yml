name: Terraform

on:
  pull_request:
    paths:
      - "**.tf"
      - ".terraform.lock.hcl"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "**.tf"
      - ".terraform.lock.hcl"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "plan runs a no-op plan; apply runs terraform apply (use only after reviewing plan)."
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  contents: read
  id-token: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Format and validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate -no-color

  check-role:
    name: Check AWS OIDC role secret
    runs-on: ubuntu-latest
    outputs:
      has_role: ${{ steps.check.outputs.has_role }}
    steps:
      - name: Detect AWS_ROLE_ARN
        id: check
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [ -n "${AWS_ROLE_ARN}" ]; then
            echo "has_role=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_role=false" >> "${GITHUB_OUTPUT}"
          fi

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: [validate, check-role]
    if: >-
      ${{
        needs.check-role.outputs.has_role == 'true' &&
        (
          github.event_name == 'pull_request' ||
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'plan')
        )
      }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -backend=false -input=false

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Write plan to job summary
        run: terraform show -no-color tfplan >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: tfplan
          if-no-files-found: error
          retention-days: 7

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [validate, check-role]
    if: >-
      ${{
        needs.check-role.outputs.has_role == 'true' &&
        github.event_name == 'workflow_dispatch' &&
        github.event.inputs.terraform_action == 'apply'
      }}
    environment: terraform-apply
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"
          terraform_wrapper: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -backend=false -input=false

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
